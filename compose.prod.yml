services:
  web:
    image: ${IMAGE_NAME}
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: event_api_prod
    command: sh -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120 --access-logfile - --error-logfile -"
    ports:
      - "8000:8000"
    env_file:
      - .env.prod
    volumes:
      - /var/www/event-backend/static:/app/staticfiles
      - /var/www/event-backend/media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  postgres:
    image: postgres:15-alpine
    container_name: event_postgres_prod
    restart: always
    env_file:
      - .env.prod
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: event_redis_prod
    restart: always

volumes:
  pgdata_prod:
  static_volume:
  media_volume: