services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        REQUIREMENTS_FILE: requirements/development.txt
    container_name: event_api_dev
    command: sh -c "sleep 5; python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:15-alpine
    container_name: event_postgres
    restart: always
    env_file:
      - .env.dev
    ports:
      - "5435:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U events_user -d events_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: event_pgadmin
    restart: always
    env_file:
      - .env.dev
    ports:
      - "8085:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  redis:
    image: redis:latest
    container_name: event_redis
    restart: always
    ports:
      - "6380:6379"

volumes:
  pgdata_dev:
  pgadmin_data: