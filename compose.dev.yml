services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        REQUIREMENTS_FILE: requirements/development.txt   # install dev deps
    container_name: event_api_dev
    # command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    command: ["/app/docker/dev/entry-point.sh"]
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: even_mysql
    restart: always
    environment:
      MYSQL_DATABASE: events_db
      MYSQL_USER: events_user
      MYSQL_PASSWORD: events_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: event_phpmyadmin
    restart: always
    environment:
      PMA_HOST: mysql
      PMA_USER: event
      PMA_PASSWORD: events_password
    ports:
      - "4000:80"
    depends_on:
      - mysql
  redis:
    image: redis:7-alpine
    container_name: event_redis
    restart: always
    ports:
      - "6380:6379"


volumes:
  mysql_data:
